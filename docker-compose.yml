services:

  # ─── Job de migraciones (1 vez) ────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wilrop-migrate
    restart: "no"
    command: ["migrate"]
    environment: &wilrop_app_env
      # Prisma construye la URL internamente a partir de estas variables
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      NODE_ENV: production
      # next-auth — obligatorio en producción
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      # Admin bootstrap opcional. Define password para crear el admin inicial.
      WILROP_ADMIN_EMAIL: ${WILROP_ADMIN_EMAIL:-admin@wilrop.com}
      WILROP_ADMIN_PASSWORD: ${WILROP_ADMIN_PASSWORD:-}
      WILROP_ADMIN_NAME: ${WILROP_ADMIN_NAME:-Administrador WILROP}
      WILROP_ADMIN_RESET_PASSWORD: ${WILROP_ADMIN_RESET_PASSWORD:-false}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wilrop-net

  # ─── Aplicación Next.js ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wilrop-app
    restart: unless-stopped
    command: ["web"]
    ports:
      - "3000:3000"
    environment: *wilrop_app_env
    volumes:
      - wilrop-uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - wilrop-net

  # ─── Base de datos PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: wilrop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - wilrop-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wilrop-net
    # Expone el puerto solo en desarrollo local; comentar en producción
    ports:
      - "5432:5432"

# ─── Volúmenes ──────────────────────────────────────────────────────────────
volumes:
  wilrop-db-data:
    name: wilrop-db-data
    driver: local
  wilrop-uploads:
    name: wilrop-uploads
    driver: local

# ─── Redes ──────────────────────────────────────────────────────────────────
networks:
  wilrop-net:
    driver: bridge
