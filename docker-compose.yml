services:

  # ─── Job de migraciones (1 vez) ────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wilrop-migrate
    restart: "no"
    command: ["migrate"]
    environment: &wilrop_app_env
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      WILROP_ADMIN_EMAIL: ${WILROP_ADMIN_EMAIL:-admin@wilrop.com}
      WILROP_ADMIN_PASSWORD: ${WILROP_ADMIN_PASSWORD:-}
      WILROP_ADMIN_NAME: ${WILROP_ADMIN_NAME:-Administrador WILROP}
      WILROP_ADMIN_RESET_PASSWORD: ${WILROP_ADMIN_RESET_PASSWORD:-false}
    networks:
      - wilrop-net

  # ─── Aplicación Next.js ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wilrop-app
    restart: unless-stopped
    command: ["web"]
    expose:
      - "3000"
    environment: *wilrop_app_env
    volumes:
      - wilrop-uploads:/app/public/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - wilrop-net
    labels:
      - traefik.enable=true
      - 'traefik.http.routers.wilrop.rule=Host(`wilropgroup.com`) || HostRegexp(`^[a-zA-Z0-9][a-zA-Z0-9-]+\\.wilropgroup\\.com$`)'
      - traefik.http.routers.wilrop.tls=true
      - traefik.http.routers.wilrop.tls.certResolver=letsencrypt
      - traefik.http.services.wilrop.loadbalancer.server.port=3000

# ─── Volúmenes ──────────────────────────────────────────────────────────────
volumes:
  wilrop-uploads:
    external: true

# ─── Redes ──────────────────────────────────────────────────────────────────
networks:
  wilrop-net:
    driver: bridge
